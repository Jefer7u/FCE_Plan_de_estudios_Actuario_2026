<!DOCTYPE html>
<html lang="es" data-mode="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ciencias Actuariales — Plan de Estudios</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }

/* ══ TOKEN SYSTEM ══ */
:root {
  /* surfaces */
  --bg:       #F9F6F3;
  --s1:       #FFFFFF;
  --s2:       #F0EBE5;
  --s3:       #E6DDD4;
  --border:   rgba(90,55,30,0.10);
  --border2:  rgba(90,55,30,0.20);

  /* text */
  --tx:       #1C1208;
  --tx2:      #6B4E35;
  --tx3:      #A8896E;

  /* accent: red */
  --red:      #D63031;
  --red-d:    #B52828;
  --red-bg:   rgba(214,48,49,0.08);
  --red-b:    rgba(214,48,49,0.22);

  /* status — warm versions */
  --ap:       #1F7A45;  --ap-d: rgba(31,122,69,0.10);  --ap-b: rgba(31,122,69,0.25);
  --di:       #D63031;  --di-d: rgba(214,48,49,0.10);  --di-b: rgba(214,48,49,0.25);
  --cu:       #C07800;  --cu-d: rgba(192,120,0,0.10);  --cu-b: rgba(192,120,0,0.25);
  --bl:       #9A8070;  --bl-d: rgba(154,128,112,0.08);--bl-b: rgba(154,128,112,0.18);

  /* categories */
  --cm: #1a4fa0; --ce: #7b35c0; --cec: #1F7A45;
  --ca: #D63031; --cd: #C07800; --co: #0F7A7A;

  --font:  'Outfit', system-ui, sans-serif;
  --mono:  'JetBrains Mono', monospace;
  --r:     10px;
  --r-lg:  14px;
  --sh:    0 1px 4px rgba(90,55,30,0.08), 0 6px 20px rgba(90,55,30,0.06);
  --sh-lg: 0 12px 40px rgba(90,55,30,0.18), 0 2px 8px rgba(90,55,30,0.10);
}

/* Modo oscuro — contraste reforzado: superficies más separadas del fondo,
   texto secundario más luminoso, bordes y estados más visibles */
[data-mode="dark"] {
  --bg:       #15100A;
  --s1:       #201812;
  --s2:       #2E241A;
  --s3:       #3D3022;
  --border:   rgba(255,215,180,0.14);
  --border2:  rgba(255,215,180,0.26);
  --tx:       #F7EFDF;
  --tx2:      #D6B896;
  --tx3:      #A98D6C;
  --red:      #FF6B6B;
  --red-d:    #FF8F8F;
  --red-bg:   rgba(255,107,107,0.14);
  --red-b:    rgba(255,107,107,0.35);
  --ap:       #4ADE80;  --ap-d: rgba(74,222,128,0.14); --ap-b: rgba(74,222,128,0.35);
  --di:       #FF6B6B;  --di-d: rgba(255,107,107,0.14);--di-b: rgba(255,107,107,0.35);
  --cu:       #FFB74D;  --cu-d: rgba(255,183,77,0.14); --cu-b: rgba(255,183,77,0.35);
  --bl:       #8D7860;  --bl-d: rgba(141,120,96,0.14); --bl-b: rgba(141,120,96,0.32);
  --cm: #7CB0FF; --ce: #C79CFF; --cec: #4ADE80;
  --ca: #FF6B6B; --cd: #FFB74D; --co: #56D4D4;
  --sh:    0 1px 4px rgba(0,0,0,0.35), 0 6px 20px rgba(0,0,0,0.30);
  --sh-lg: 0 12px 48px rgba(0,0,0,0.60), 0 2px 8px rgba(0,0,0,0.35);
}

/* ══ BASE ══ */
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--tx);
  font-size: 15px;
  line-height: 1.55;
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
}

/* ══ HEADER ══ */
.hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; height: 64px; gap: 16px;
  background: var(--s1); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 50; box-shadow: var(--sh);
}
.hdr-brand { display: flex; align-items: center; gap: 12px; }
.hdr-pip {
  width: 8px; height: 32px; border-radius: 4px; background: var(--red); flex-shrink: 0;
}
.hdr-title-wrap {}
.hdr-title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; line-height: 1.2; }
.hdr-sub { font-size: 12px; color: var(--tx3); font-family: var(--mono); margin-top: 1px; }
.hdr-right { display: flex; align-items: center; gap: 10px; }
.hdr-pct {
  font-size: 26px; font-weight: 700; font-family: var(--mono);
  color: var(--red); min-width: 64px; text-align: right; line-height: 1;
}
.hdr-pct-sub { font-size: 11px; color: var(--tx3); text-align: right; margin-top: 1px; font-family: var(--mono); white-space: nowrap; }
.icon-btn {
  width: 36px; height: 36px; border-radius: var(--r); border: 1px solid var(--border2);
  background: var(--s2); color: var(--tx2); display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: all 0.15s; flex-shrink: 0;
}
.icon-btn:hover { background: var(--s3); color: var(--tx); transform: scale(1.05); }
.txt-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 0 14px; height: 36px; border-radius: var(--r);
  border: 1px solid var(--border2); background: var(--s2); color: var(--tx2);
  font-size: 13px; font-weight: 500; transition: all 0.15s; white-space: nowrap;
}
.txt-btn:hover { background: var(--s3); color: var(--tx); }
.txt-btn svg { width: 14px; height: 14px; }

/* ══ STAT STRIP ══ */
.strip {
  display: flex; gap: 12px; flex-wrap: wrap; align-items: stretch;
  padding: 16px 32px; background: var(--s1); border-bottom: 1px solid var(--border);
}

.stat-card {
  flex: 1; min-width: 130px;
  background: var(--bg); border: 1.5px solid var(--border);
  border-radius: var(--r-lg); padding: 16px 18px;
  cursor: pointer; transition: all 0.18s; position: relative; overflow: hidden;
}
.stat-card::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0;
  height: 3px; border-radius: 0 0 var(--r-lg) var(--r-lg);
}
.stat-ap::after  { background: var(--ap); }
.stat-pe::after  { background: var(--red); }
.stat-di::after  { background: var(--di); }
.stat-cu::after  { background: var(--cu); }
.stat-bl::after  { background: var(--bl); }
.stat-card:hover  { border-color: var(--border2); box-shadow: var(--sh); transform: translateY(-2px); }
.stat-card.active { border-color: var(--border2); background: var(--s2); box-shadow: var(--sh); }
.stat-n { font-size: 34px; font-weight: 700; font-family: var(--mono); line-height: 1; margin-bottom: 4px; }
.c-ap { color: var(--ap); } .c-di { color: var(--di); }
.c-cu { color: var(--cu); } .c-bl { color: var(--bl); }
.c-pe { color: var(--red); }
.stat-lbl { font-size: 13px; color: var(--tx3); font-weight: 500; }
.stat-hint { font-size: 10px; color: var(--tx3); font-family: var(--mono); margin-top: 2px; opacity: 0.8; }

/* tramo progress */
.tramo-wrap {
  flex: 2; min-width: 260px;
  background: var(--bg); border: 1.5px solid var(--border);
  border-radius: var(--r-lg); padding: 16px 20px; display: flex; flex-direction: column; justify-content: center; gap: 7px;
}
.tramo-row { display: flex; align-items: center; gap: 12px; }
.tramo-lbl { font-size: 12px; color: var(--tx3); font-family: var(--mono); width: 90px; flex-shrink: 0; }
.tramo-track { flex: 1; height: 7px; background: var(--s3); border-radius: 4px; overflow: hidden; }
.tramo-fill  { height: 100%; background: var(--ap); border-radius: 4px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }
.tramo-frac  { font-size: 12px; font-family: var(--mono); color: var(--tx3); width: 32px; text-align: right; font-weight: 500; }

/* ══ TABS ══ */
.tabs-bar {
  background: var(--s1); border-bottom: 1px solid var(--border);
  display: flex; align-items: stretch; justify-content: space-between;
  padding: 0 32px; flex-wrap: wrap; gap: 0;
}
.tabs { display: flex; align-items: stretch; }
.tab {
  padding: 0 22px; height: 48px; font-size: 14px; font-weight: 500;
  color: var(--tx3); border-bottom: 2.5px solid transparent;
  cursor: pointer; transition: all 0.15s; display: flex; align-items: center;
}
.tab:hover { color: var(--tx2); }
.tab.active { color: var(--tx); border-bottom-color: var(--red); }
.filter-row {
  display: flex; align-items: center; gap: 6px; padding: 8px 0;
  overflow-x: auto; scrollbar-width: none; flex: 1; justify-content: flex-end;
}
.filter-row::-webkit-scrollbar { display: none; }
.chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: 500;
  border: 1.5px solid var(--border); background: transparent; color: var(--tx3);
  cursor: pointer; transition: all 0.13s; white-space: nowrap;
}
.chip:hover { border-color: var(--border2); color: var(--tx2); background: var(--s2); }
.chip.active { color: var(--tx); background: var(--s2); border-color: var(--border2); }
.chip-dot { width: 7px; height: 7px; border-radius: 50%; }

/* ══ PANELS ══ */
.panel { display: none; }
.panel.active { display: block; }

/* ══ GRAPH PANEL ══ */
.graph-outer { padding: 24px 32px; overflow-x: auto; }
.graph-legend {
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  padding: 12px 18px; margin-bottom: 20px;
  background: var(--s1); border: 1px solid var(--border); border-radius: var(--r);
}
.leg { display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--tx2); }
.leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.leg-sep { width: 1px; height: 16px; background: var(--border2); }
.leg-hint { font-size: 12px; color: var(--tx3); margin-left: auto; font-style: italic; }
#graph-svg { display: block; overflow: visible; }
.g-node { cursor: pointer; }
.g-edge { pointer-events: none; transition: opacity 0.2s; }
.dimmed { opacity: 0.08 !important; }

/* ══ GRID PANEL — KANBAN ══ */
.grid-outer { padding: 24px 32px; overflow-x: auto; }

/* kanban layout */
.kanban { display: flex; gap: 14px; align-items: flex-start; min-width: max-content; }
.kanban-col { width: 210px; flex-shrink: 0; display: flex; flex-direction: column; }

.kanban-col-hdr {
  padding: 12px 14px 10px;
  border-radius: var(--r-lg) var(--r-lg) 0 0;
  background: var(--s2); border: 1.5px solid var(--border2); border-bottom: none;
}
.kanban-col-title {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.7px; color: var(--tx2);
}
.kanban-col-meta {
  font-size: 10px; font-family: var(--mono); color: var(--tx3);
  margin-top: 3px; display: flex; align-items: center;
}
.kanban-col-pct { margin-left: auto; color: var(--red); font-weight: 700; }
.kanban-col-bar { margin-top: 5px; height: 4px; background: var(--s3); border-radius: 2px; overflow: hidden; }
.kanban-col-bar-fill {
  height: 100%; border-radius: 2px; background: var(--ap);
  transition: width 0.5s cubic-bezier(.4,0,.2,1);
}
.kanban-col-body {
  display: flex; flex-direction: column; gap: 8px;
  padding: 8px 8px 12px;
  border: 1.5px solid var(--border2); border-top: none;
  border-radius: 0 0 var(--r-lg) var(--r-lg);
  background: var(--s1); min-height: 60px;
}
.kanban-empty {
  padding: 14px 10px; font-size: 11px; color: var(--tx3);
  text-align: center; font-style: italic;
}

.s-card {
  background: var(--s1); border: 1.5px solid var(--border); border-radius: var(--r-lg);
  cursor: pointer; transition: all 0.15s;
  position: relative; overflow: hidden; box-shadow: var(--sh);
}
.s-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
  border-radius: var(--r-lg) 0 0 var(--r-lg);
}
.s-card.aprobada::before { background: var(--ap); }
.s-card.disponible::before { background: var(--di); }
.s-card.cursando::before { background: var(--cu); }
.s-card.bloqueada::before { background: var(--bl); }
.s-card.aprobada { border-color: var(--ap-b); background: var(--ap-d); }
.s-card.disponible { border-color: var(--di-b); background: var(--di-d); }
.s-card.cursando { border-color: var(--cu-b); background: var(--cu-d); }
.s-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: var(--sh-lg); }
.s-card.hidden { display: none; }
/* top category stripe */
.s-cat-stripe { height: 3px; margin: 0 10px; border-radius: 0 0 3px 3px; }
/* card inner padding */
.s-inner { padding: 10px 12px 8px 16px; }
.s-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
.s-code { font-family: var(--mono); font-size: 11px; color: var(--tx3); font-weight: 500; }
.s-tog { font-size: 16px; line-height: 1; padding: 2px 3px; transition: transform 0.15s; border-radius: 6px; background: var(--red-bg); }
.s-tog:hover { transform: scale(1.25); background: var(--red-bg); }
.s-name { font-size: 13px; font-weight: 600; color: var(--tx); line-height: 1.35; margin-bottom: 7px; }
.s-card.bloqueada .s-name { color: var(--tx3); }
.s-foot { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
.s-cat { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 6px; }
.cat-matematica  { background: rgba(26,79,160,0.10);  color: var(--cm); }
.cat-estadistica { background: rgba(123,53,192,0.10); color: var(--ce); }
.cat-economia    { background: rgba(31,122,69,0.10);  color: var(--cec); }
.cat-actuarial   { background: rgba(214,48,49,0.10);  color: var(--ca); }
.cat-derecho     { background: rgba(192,120,0,0.10);  color: var(--cd); }
.cat-otros       { background: rgba(15,122,122,0.10); color: var(--co); }
[data-mode="dark"] .s-cat { background: rgba(255,255,255,0.08); }
.s-hours { font-family: var(--mono); font-size: 11px; color: var(--tx3); font-weight: 500; margin-left: auto; }
.s-crit { font-size: 11px; }
/* status bar at card bottom */
.s-status-bar {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px 6px 16px;
  border-top: 1px solid var(--border);
  font-size: 11px; font-weight: 600; color: var(--tx3);
}
.s-status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

/* ══ MODAL ══ */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(28,18,8,0.55); z-index: 200;
  align-items: center; justify-content: center; padding: 16px;
  backdrop-filter: blur(8px);
}
[data-mode="dark"] .overlay { background: rgba(0,0,0,0.65); }
.overlay.open { display: flex; animation: fo 0.2s ease; }
@keyframes fo { from { opacity:0; } to { opacity:1; } }
.modal {
  background: var(--s1); border: 1.5px solid var(--border2); border-radius: var(--r-lg);
  width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto;
  box-shadow: var(--sh-lg); animation: sl 0.22s cubic-bezier(.4,0,.2,1);
}
@keyframes sl { from { transform:translateY(14px); opacity:0; } to { transform:none; opacity:1; } }
.m-head {
  padding: 20px 22px 16px; border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--s1); z-index: 2;
  display: flex; align-items: flex-start; gap: 12px;
}
.m-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 11px; border-radius: 20px; font-size: 13px; font-weight: 600;
  flex-shrink: 0; margin-top: 2px;
}
.bap { background: var(--ap-d); color: var(--ap); border: 1px solid var(--ap-b); }
.bdi { background: var(--di-d); color: var(--di); border: 1px solid var(--di-b); }
.bcu { background: var(--cu-d); color: var(--cu); border: 1px solid var(--cu-b); }
.bbl { background: var(--bl-d); color: var(--bl); border: 1px solid var(--bl-b); }
[data-mode="dark"] .bbl { color: var(--tx2); }
.m-info { flex: 1; min-width: 0; }
.m-code-lbl { font-family: var(--mono); font-size: 12px; color: var(--tx3); margin-bottom: 3px; }
.m-name-el { font-size: 17px; font-weight: 700; line-height: 1.25; }
.m-close { color: var(--tx3); font-size: 24px; line-height: 1; padding: 2px; transition: color 0.13s; flex-shrink: 0; }
.m-close:hover { color: var(--tx); }
.m-body { padding: 18px 22px; }
.m-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 18px; }
.m-cell { background: var(--s2); border-radius: var(--r); padding: 12px 14px; border: 1px solid var(--border); }
.m-cell-k { font-size: 11px; color: var(--tx3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; }
.m-cell-v { font-size: 15px; font-weight: 600; }
.m-sec {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.7px; color: var(--tx3);
  text-transform: uppercase; margin: 16px 0 8px;
  display: flex; align-items: center; gap: 10px;
}
.m-sec::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.m-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 0; border-bottom: 1px solid var(--border); gap: 10px;
}
.m-row:last-child { border-bottom: none; }
.m-row-name { font-size: 14px; color: var(--tx2); font-weight: 500; }
.m-rbadge { font-size: 12px; font-weight: 600; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
.m-actions {
  padding: 14px 22px; border-top: 1px solid var(--border);
  display: flex; gap: 9px; flex-wrap: wrap;
}
.m-btn {
  flex: 1; min-width: 90px; display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 10px 14px; border-radius: var(--r); font-size: 14px; font-weight: 600;
  border: 1.5px solid transparent; cursor: pointer; transition: all 0.15s;
}
.m-ap  { background: var(--ap-d); color: var(--ap); border-color: var(--ap-b); }
.m-ap:hover  { background: var(--ap); color: #fff; }
.m-cu  { background: var(--cu-d); color: var(--cu); border-color: var(--cu-b); }
.m-cu:hover  { background: var(--cu); color: #fff; }
.m-rst { background: var(--s2); color: var(--tx2); border-color: var(--border2); }
.m-rst:hover { background: var(--s3); color: var(--tx); }

/* ══ TOAST ══ */
.toast {
  position: fixed; bottom: 28px; right: 28px; z-index: 300;
  background: var(--tx); color: var(--bg);
  padding: 11px 18px; border-radius: var(--r); font-size: 14px; font-weight: 600;
  opacity: 0; transform: translateY(10px); transition: all 0.22s;
  pointer-events: none; box-shadow: var(--sh-lg);
}
.toast.show { opacity: 1; transform: translateY(0); }

/* ══ RESPONSIVE ══ */
@media (max-width: 720px) {
  .hdr, .strip, .tabs-bar, .graph-outer, .grid-outer { padding-left: 16px; padding-right: 16px; }
  .hdr-pct { font-size: 20px; }
  .txt-btn span { display: none; }
  .tabs-bar { flex-direction: column; align-items: flex-start; }
  .filter-row { justify-content: flex-start; padding-bottom: 8px; }
  .m-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-brand">
    <div class="hdr-pip"></div>
    <div class="hdr-title-wrap">
      <div class="hdr-title">Ciencias Actuariales</div>
      <div class="hdr-sub">FCE-UBA · Plan de estudios</div>
    </div>
  </div>
  <div class="hdr-right">
    <div>
      <div class="hdr-pct" id="pct-num">0%</div>
      <div class="hdr-pct-sub" id="pct-sub">completado</div>
    </div>
    <button class="icon-btn" id="mode-btn" onclick="toggleMode()" title="Cambiar modo">🌙</button>
    <button class="txt-btn" onclick="exportProgress()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 10v4h12v-4M8 2v8M5 7l3 3 3-3"/></svg>
      <span>Exportar</span>
    </button>
    <button class="txt-btn" onclick="importProgress()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 10v4h12v-4M8 10V2M5 5l3-3 3 3"/></svg>
      <span>Importar</span>
    </button>
    <button class="txt-btn" onclick="resetConfirm()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 8a5 5 0 1 1 1.5 3.5M3 12V8H7"/></svg>
      <span>Reiniciar</span>
    </button>
  </div>
</header>

<!-- STAT STRIP -->
<div class="strip">

// ══ DATA ══
const S = {

};

const LEVELS = ['Primer Tramo','Segundo Tramo','Ciclo Profesional','Optativas'];
const LV_SHORT = {'Primer Tramo':'1° Tramo','Segundo Tramo':'2° Tramo','Ciclo Profesional':'Ciclo Prof.','Optativas':'Optativas'};
const CAT_NAME = { matematica:'Matemáticas', estadistica:'Estadística', economia:'Economía', actuarial:'Actuarial', derecho:'Derecho', otros:'Otras' };
const ICON = { aprobada:'✅', disponible:'📚', cursando:'📖', bloqueada:'🚫' };
const BC = { aprobada:'bap', disponible:'bdi', cursando:'bcu', bloqueada:'bbl' };

let AP = new Set(), CU = new Set(), filterSt = null, filterCatV = 'all';

function st(c) {
  if (AP.has(c)) return 'aprobada';
  if (CU.has(c)) return 'cursando';
  if (S[c].pre.every(p => AP.has(p))) return 'disponible';
  return 'bloqueada';
}

// ¿La tarjeta queda oculta por el filtro de estado? ('pendiente' = todo lo no aprobado)
function stHidden(status) {
  if (!filterSt) return false;
  if (filterSt === 'pendiente') return status === 'aprobada';
  return filterSt !== status;
}

// Topological depth: guarantees all edges go left→right
const _dc = {};
function depth(c) {
  if (_dc[c] !== undefined) return _dc[c];
  if (!S[c].pre.length) return (_dc[c] = 0);
  return (_dc[c] = Math.max(...S[c].pre.map(depth)) + 1);
}

// Read CSS variable (resolves for current mode)
function cv(v) { return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

// Parse hex to R,G,B string
function rgb(hex) {
  hex = hex.trim().replace('#','');
  if (hex.length === 3) hex = hex.split('').map(c=>c+c).join('');
  return [parseInt(hex.slice(0,2),16), parseInt(hex.slice(2,4),16), parseInt(hex.slice(4,6),16)].join(',');
}
function rgba(hex, a) { return `rgba(${rgb(hex)},${a})`; }

// Status → CSS var names
function stCols(status) {
  const m = { aprobada:'--ap', disponible:'--di', cursando:'--cu', bloqueada:'--bl' };
  return cv(m[status]);
}
function catCol(cat) {
  const m = { matematica:'--cm', estadistica:'--ce', economia:'--cec', actuarial:'--ca', derecho:'--cd', otros:'--co' };
  return cv(m[cat] || '--co');
}

// ══ GRAPH BUILD ══
function buildGraph() {
  const NW = 148, VGAP = 10, HGAP = 50, PX = 24, PY = 30;
  const ns = 'http://www.w3.org/2000/svg';

  // Group by topo depth
  const byD = {};
  Object.keys(S).forEach(c => {
    const d = depth(c);
    if (!byD[d]) byD[d] = [];
    byD[d].push(c);
  });
  const maxD = Math.max(...Object.keys(byD).map(Number));

  // Node height proportional to credit hours (6VH = taller)
  const NH = c => S[c].h === '6VH' ? 66 : 56;

  // Compute positions
  const pos = {};
  const colX = [];
  for (let d = 0; d <= maxD; d++) {
    colX[d] = PX + d * (NW + HGAP);
    let y = PY;
    (byD[d] || []).forEach(c => {
      pos[c] = { x: colX[d], y, w: NW, h: NH(c) };
      y += NH(c) + VGAP;
    });
  }

  const svgW = PX + (maxD + 1) * (NW + HGAP) - HGAP + PX;
  let maxY = 0;
  Object.values(pos).forEach(p => { if (p.y + p.h + PY > maxY) maxY = p.y + p.h + PY; });
  const svgH = maxY;

  const svg = document.createElementNS(ns, 'svg');
  svg.id = 'graph-svg';
  svg.setAttribute('width', svgW);
  svg.setAttribute('height', svgH);
  svg.setAttribute('viewBox', `0 0 ${svgW} ${svgH}`);

  // DEFS: arrows
  const defs = document.createElementNS(ns, 'defs');
  const mkArr = (id, col) => {
    const m = document.createElementNS(ns,'marker');
    m.setAttribute('id',id); m.setAttribute('markerWidth','8'); m.setAttribute('markerHeight','6');
    m.setAttribute('refX','7.5'); m.setAttribute('refY','3'); m.setAttribute('orient','auto');
    const p = document.createElementNS(ns,'polygon');
    p.setAttribute('points','0 0,8 3,0 6'); p.setAttribute('fill',col);
    m.appendChild(p); defs.appendChild(m);
  };
  ['ap','di','cu','bl'].forEach(k => mkArr('arr-'+k, cv('--'+k)));
  mkArr('arr-hi', cv('--red'));
  svg.appendChild(defs);

  // Alternating column bands
  for (let d = 0; d <= maxD; d++) {
    if (d % 2 === 0) {
      const band = document.createElementNS(ns,'rect');
      band.setAttribute('x', colX[d] - HGAP/2); band.setAttribute('y', 0);
      band.setAttribute('width', NW + HGAP); band.setAttribute('height', svgH);
      band.setAttribute('fill', isDark ? 'rgba(255,225,190,0.03)' : 'rgba(128,100,80,0.025)');
      svg.appendChild(band);
    }
    // Column label
    const lbl = document.createElementNS(ns,'text');
    lbl.setAttribute('x', colX[d] + NW/2); lbl.setAttribute('y', 14);
    lbl.setAttribute('text-anchor','middle'); lbl.setAttribute('font-size','9');
    lbl.setAttribute('font-family','JetBrains Mono, monospace'); lbl.setAttribute('letter-spacing','0.3');
    lbl.setAttribute('fill', cv('--tx3'));
    const colLabels = ['1°TRA','2°TRA','CP.I','CP.II','CP.III','CP.IV','CP.V','FINAL'];
    lbl.textContent = colLabels[d] || `D${d}`;
    svg.appendChild(lbl);
  }

  // EDGES
  const edgeG = document.createElementNS(ns,'g'); edgeG.id = 'eg';
  const edges = [];
  Object.entries(S).forEach(([tgt,d]) => {
    d.pre.forEach(src => {
      if (!pos[src]||!pos[tgt]) return;
      const ps = pos[src], pt = pos[tgt];
      const x1 = ps.x+ps.w, y1 = ps.y+ps.h/2;
      const x2 = pt.x-1,    y2 = pt.y+pt.h/2;
      const dx = x2-x1, cx1 = x1+dx*0.5, cx2 = x2-dx*0.5;
      const el = document.createElementNS(ns,'path');
      el.setAttribute('d',`M${x1},${y1} C${cx1},${y1} ${cx2},${y2} ${x2},${y2}`);
      el.setAttribute('fill','none'); el.setAttribute('stroke-width','1.6');
      el.setAttribute('class','g-edge');
      el.dataset.src=src; el.dataset.tgt=tgt;
      edgeG.appendChild(el);
      edges.push({src,tgt,el});
    });
  });
  svg.appendChild(edgeG);

  // NODES
  const nodeG = document.createElementNS(ns,'g');
  Object.entries(S).forEach(([code,d]) => {
    const p = pos[code];
    const status = st(code);
    const scol = stCols(status);
    const ccol = catCol(d.cat);
    const isBlocked = status === 'bloqueada';
    // En modo oscuro las bloqueadas mantienen más opacidad para no perderse
    const textOpacity = isBlocked ? (isDark ? '0.60' : '0.40') : '1';

    const g = document.createElementNS(ns,'g');
    g.setAttribute('class','g-node');
    g.dataset.code = code; g.dataset.status = status; g.dataset.cat = d.cat;

    // Card background
    const rect = document.createElementNS(ns,'rect');
    rect.setAttribute('x',p.x); rect.setAttribute('y',p.y);
    rect.setAttribute('width',p.w); rect.setAttribute('height',p.h);
    rect.setAttribute('rx','10');
    const fillCol = isBlocked ? cv('--s2') : rgba(scol, isDark ? '0.16' : '0.12');
    const strokeCol = isBlocked ? cv('--border2') : rgba(scol, isDark ? '0.55' : '0.4');
    rect.setAttribute('fill', fillCol);
    rect.setAttribute('stroke', strokeCol);
    rect.setAttribute('stroke-width','1.5');
    g.appendChild(rect);

    // Left stripe (category color)
    const stripe = document.createElementNS(ns,'rect');
    stripe.setAttribute('x',p.x); stripe.setAttribute('y',p.y+8);
    stripe.setAttribute('width','3'); stripe.setAttribute('height',p.h-16);
    stripe.setAttribute('rx','1.5'); stripe.setAttribute('fill',ccol);
    stripe.setAttribute('opacity', isBlocked ? (isDark?'0.30':'0.15') : '0.8');
    g.appendChild(stripe);

    // Code (top left)
    const tc = document.createElementNS(ns,'text');
    tc.setAttribute('x',p.x+12); tc.setAttribute('y',p.y+17);
    tc.setAttribute('font-size','10'); tc.setAttribute('font-family','JetBrains Mono, monospace');
    tc.setAttribute('font-weight','500'); tc.setAttribute('fill',cv('--tx3'));
    tc.setAttribute('opacity', isBlocked ? (isDark?'0.65':'0.40') : (isDark?'0.9':'0.7'));
    tc.textContent = code;
    g.appendChild(tc);

    // Hours tag (top right)
    const th = document.createElementNS(ns,'text');
    th.setAttribute('x',p.x+p.w-10); th.setAttribute('y',p.y+17);
    th.setAttribute('text-anchor','end'); th.setAttribute('font-size','9');
    th.setAttribute('font-family','JetBrains Mono, monospace'); th.setAttribute('fill',cv('--tx3'));
    th.setAttribute('opacity', isBlocked ? (isDark?'0.55':'0.30') : (isDark?'0.85':'0.6'));
    th.textContent = d.h;
    g.appendChild(th);

    // Name (wrapped, 2 lines max)
    const words = d.name.split(' ');
    const lines = []; let cur = '';
    const maxC = 17;
    words.forEach(w => {
      const try_ = cur ? cur+' '+w : w;
      if (try_.length <= maxC) cur = try_;
      else { if (cur) lines.push(cur); cur = w; }
    });
    if (cur) lines.push(cur);
    const nameLines = lines.slice(0,2);
    if (lines.length > 2) nameLines[1] = nameLines[1].slice(0,maxC-1)+'…';

    const baseY = p.y + (p.h <= 58 ? 34 : 32);
    nameLines.forEach((line,i) => {
      const tn = document.createElementNS(ns,'text');
      tn.setAttribute('x',p.x+12); tn.setAttribute('y',baseY+i*13);
      tn.setAttribute('font-size', i===0?'11.5':'10.5');
      tn.setAttribute('font-family','Outfit, system-ui, sans-serif');
      tn.setAttribute('font-weight', i===0?'600':'400');
      tn.setAttribute('fill',cv('--tx')); tn.setAttribute('opacity',textOpacity);
      tn.textContent = line;
      g.appendChild(tn);
    });

    // Status icon bottom-right
    const si = document.createElementNS(ns,'text');
    si.setAttribute('x',p.x+p.w-10); si.setAttribute('y',p.y+p.h-8);
    si.setAttribute('text-anchor','end'); si.setAttribute('font-size','11');
    si.textContent = ICON[status];
    g.appendChild(si);

    nodeG.appendChild(g);
    g.addEventListener('mouseenter',()=>hiNode(code,edges,nodeG,edgeG));
    g.addEventListener('mouseleave',()=>clearHi(edges,nodeG,edgeG));
    g.addEventListener('click',()=>openModal(code));
  });
  svg.appendChild(nodeG);

  colorEdges(edges);
  window._edges = edges;

  const cont = document.getElementById('graph-container');
  cont.innerHTML = ''; cont.appendChild(svg);
}

function colorEdges(edges) {
  edges.forEach(({src,el}) => {
    const s = st(src);
    const col = stCols(s);
    el.setAttribute('stroke', col);
    // Aristas más visibles en modo oscuro
    el.setAttribute('stroke-opacity', s==='bloqueada' ? (isDark?'0.30':'0.15') : (isDark?'0.58':'0.40'));
    el.setAttribute('marker-end',`url(#arr-${s==='aprobada'?'ap':s==='disponible'?'di':s==='cursando'?'cu':'bl'})`);
  });
}

function hiNode(code, edges, nodeG, edgeG) {
  const anc = new Set(), des = new Set();
  const ga = c => S[c].pre.forEach(p=>{ anc.add(p); ga(p); });
  const gd = c => Object.keys(S).forEach(k=>{ if(S[k].pre.includes(c)){des.add(k);gd(k);} });
  ga(code); gd(code);
  nodeG.querySelectorAll('.g-node').forEach(g=>{
    const c=g.dataset.code;
    g.classList.toggle('dimmed', c!==code&&!anc.has(c)&&!des.has(c));
  });
  edgeG.querySelectorAll('.g-edge').forEach(el=>{
    const s=el.dataset.src, t=el.dataset.tgt;
    const rel = (s===code||t===code||(anc.has(s)&&(anc.has(t)||t===code))||(des.has(t)&&(des.has(s)||s===code)));
    if (rel) {
      el.classList.remove('dimmed');
      el.setAttribute('stroke',cv('--red'));
      el.setAttribute('stroke-opacity','0.9');
      el.setAttribute('stroke-width','2.2');
      el.setAttribute('marker-end','url(#arr-hi)');
    } else { el.classList.add('dimmed'); }
  });
}

function clearHi(edges,nodeG,edgeG) {
  nodeG.querySelectorAll('.g-node').forEach(g=>g.classList.remove('dimmed'));
  edgeG.querySelectorAll('.g-edge').forEach(el=>el.classList.remove('dimmed'));
  if (edges) colorEdges(edges);
}

// ══ GRID BUILD — KANBAN ══
function buildGrid() {
  const outer = document.getElementById('grid-outer');
  outer.innerHTML = '';
  const kanban = document.createElement('div'); kanban.className = 'kanban';
  outer.appendChild(kanban);

  // 1er Tramo — una columna
  buildKanbanCol(kanban, '1° Tramo',
    Object.entries(S).filter(([,d])=>d.lv==='Primer Tramo').map(([c])=>c));

  // 2do Tramo — una columna
  buildKanbanCol(kanban, '2° Tramo',
    Object.entries(S).filter(([,d])=>d.lv==='Segundo Tramo').map(([c])=>c));

  // Ciclo Profesional — subcolumnas por profundidad topológica
  const cpCodes = Object.entries(S).filter(([,d])=>d.lv==='Ciclo Profesional').map(([c])=>c);
  const byD = {};
  cpCodes.forEach(c => { const d = depth(c); if(!byD[d]) byD[d]=[]; byD[d].push(c); });
  const cpDepths = Object.keys(byD).map(Number).sort((a,b)=>a-b);
  cpDepths.forEach((d,i) => buildKanbanCol(kanban, `CP · ${i+1}`, byD[d]));

  // Optativas — columna final sin correlativas
  buildKanbanCol(kanban, 'Optativas',
    Object.entries(S).filter(([,d])=>d.lv==='Optativas').map(([c])=>c));
}

function buildKanbanCol(container, colTitle, codes) {
  const apCount = codes.filter(c => AP.has(c)).length;
  const pct = codes.length ? Math.round(apCount/codes.length*100) : 0;

  const col = document.createElement('div'); col.className = 'kanban-col';
  col.innerHTML = `
    <div class="kanban-col-hdr">
      <div class="kanban-col-title">${colTitle}</div>
      <div class="kanban-col-meta">
        <span>${apCount}/${codes.length} apr.</span>
        <span class="kanban-col-pct">${pct}%</span>
      </div>
      <div class="kanban-col-bar">
        <div class="kanban-col-bar-fill" style="width:${pct}%"></div>
      </div>
    </div>`;

  const body = document.createElement('div'); body.className = 'kanban-col-body';
  let visible = 0;

  const ST_LBL = { aprobada:'Aprobada', disponible:'Disponible', cursando:'Cursando', bloqueada:'Bloqueada' };

  codes.forEach(code => {
    const d = S[code], status = st(code);
    const hidden = stHidden(status) || (filterCatV !== 'all' && filterCatV !== d.cat);
    if (hidden) return;
    visible++;

    const catC = catCol(d.cat), stC = cv('--' + {aprobada:'ap',disponible:'di',cursando:'cu',bloqueada:'bl'}[status]);
    const card = document.createElement('div');
    card.className = `s-card ${status}`;
    card.dataset.code = code; card.dataset.status = status; card.dataset.cat = d.cat;
    card.onclick = () => openModal(code);

    card.innerHTML = `
      <div class="s-cat-stripe" style="background:${catC};opacity:${status==='bloqueada'?(isDark?'0.35':'0.18'):'0.70'}"></div>
      <div class="s-inner">
        <div class="s-top">
          <span class="s-code">${code}</span>
          <button class="s-tog" onclick="event.stopPropagation();toggle('${code}')" title="Avanzar estado">${ICON[status]}</button>
        </div>
        <div class="s-name">${d.name}</div>
        <div class="s-foot">
          <span class="s-cat cat-${d.cat}">${CAT_NAME[d.cat]}</span>
          <span class="s-hours">${d.h}</span>
          ${d.crit?'<span class="s-crit">⭐</span>':''}
        </div>
      </div>
      <div class="s-status-bar">
        <div class="s-status-dot" style="background:${stC}"></div>
        <span style="color:${stC}">${ST_LBL[status]}</span>
      </div>`;

    body.appendChild(card);
  });

  if (visible === 0) body.innerHTML = `<div class="kanban-empty">Sin materias en este filtro</div>`;
  col.appendChild(body); container.appendChild(col);
}

// ══ STATS ══
function updateStats() {
  const codes=Object.keys(S);
  const cnt={aprobada:0,disponible:0,cursando:0,bloqueada:0};
  codes.forEach(c=>cnt[st(c)]++);
  const rest = codes.length - cnt.aprobada;
  const pct=Math.round(cnt.aprobada/codes.length*100);
  document.getElementById('n-ap').textContent=cnt.aprobada;
  document.getElementById('n-pe').textContent=rest;
  document.getElementById('n-di').textContent=cnt.disponible;
  document.getElementById('n-cu').textContent=cnt.cursando;
  document.getElementById('n-bl').textContent=cnt.bloqueada;
  document.getElementById('pct-num').textContent=pct+'%';
  document.getElementById('pct-sub').textContent = rest === 0
    ? '¡Carrera completa! 🎓'
    : `${cnt.aprobada}/${codes.length} · faltan ${rest}`;
  document.getElementById('pe-hint').textContent =
    `${cnt.disponible} disp. · ${cnt.cursando} curs. · ${cnt.bloqueada} bloq.`;

  const bars=document.getElementById('tramo-bars'); bars.innerHTML='';
  LEVELS.forEach(lv=>{
    const cs=Object.entries(S).filter(([,d])=>d.lv===lv).map(([c])=>c);
    const ap=cs.filter(c=>AP.has(c)).length;
    const row=document.createElement('div'); row.className='tramo-row';
    row.innerHTML=`<span class="tramo-lbl">${LV_SHORT[lv]}</span>
      <div class="tramo-track"><div class="tramo-fill" style="width:${cs.length?Math.round(ap/cs.length*100):0}%"></div></div>
      <span class="tramo-frac">${ap}/${cs.length}</span>`;
    bars.appendChild(row);
  });
}

// ══ INTERACTIONS ══
function toggle(code) {
  const s=st(code);
  if(s==='bloqueada'){
    const falta=S[code].pre.filter(p=>!AP.has(p)).length;
    toast(`🚫 Bloqueada — faltan ${falta} correlativa${falta===1?'':'s'}`);
    return;
  }
  if(s==='disponible') CU.add(code);
  else if(s==='cursando'){CU.delete(code);AP.add(code);}
  else if(s==='aprobada') AP.delete(code);
  save(); render(); toast(`${ICON[st(code)]}  ${S[code].name}`);
}

function filterStatus(s) {
  filterSt=filterSt===s?null:s;
  ['ap','pe','di','cu','bl'].forEach(k=>document.getElementById('sc-'+k).classList.remove('active'));
  if(filterSt){const m={aprobada:'sc-ap',pendiente:'sc-pe',disponible:'sc-di',cursando:'sc-cu',bloqueada:'sc-bl'};document.getElementById(m[filterSt]).classList.add('active');}
  render();
}
function filterCat(el,cat) {
  filterCatV=cat;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active')); el.classList.add('active');
  render();
}
function switchTab(tab,el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); el.classList.add('active');
  document.getElementById('panel-graph').classList.toggle('active',tab==='graph');
  document.getElementById('panel-grid').classList.toggle('active',tab==='grid');
}

// ══ MODAL ══
function openModal(code) {
  const d=S[code], status=st(code);
  document.getElementById('m-code').textContent=`${code} · ${d.lv}`;
  document.getElementById('m-name-el').textContent=d.name;
  const badge=document.getElementById('m-badge');
  badge.textContent=`${ICON[status]} ${status.charAt(0).toUpperCase()+status.slice(1)}`;
  badge.className='m-badge '+BC[status];

  let body=`<div class="m-grid">
    <div class="m-cell"><div class="m-cell-k">Carga</div><div class="m-cell-v">${d.h}</div></div>
    <div class="m-cell"><div class="m-cell-k">Área</div><div class="m-cell-v">${CAT_NAME[d.cat]}</div></div>
    <div class="m-cell"><div class="m-cell-k">Tramo</div><div class="m-cell-v">${LV_SHORT[d.lv]}</div></div>
    <div class="m-cell"><div class="m-cell-k">Prioridad</div><div class="m-cell-v">${d.crit?'⭐ Crítica':'Normal'}</div></div>
  </div>`;

  if(d.pre.length){
    body+=`<div class="m-sec">Necesita aprobar</div>`;
    d.pre.forEach(p=>{
      const ps=st(p);
      body+=`<div class="m-row"><span class="m-row-name">${p} — ${S[p]?.name||p}</span><span class="m-rbadge ${BC[ps]}">${ICON[ps]} ${ps.charAt(0).toUpperCase()+ps.slice(1)}</span></div>`;
    });
  }
  const deps=Object.entries(S).filter(([,v])=>v.pre.includes(code));
  if(deps.length){
    body+=`<div class="m-sec">Desbloquea</div>`;
    deps.forEach(([dc,ds])=>{
      const dst=st(dc);
      body+=`<div class="m-row"><span class="m-row-name">${dc} — ${ds.name}</span><span class="m-rbadge ${BC[dst]}">${ICON[dst]} ${dst.charAt(0).toUpperCase()+dst.slice(1)}</span></div>`;
    });
  }
  document.getElementById('m-body').innerHTML=body;
  document.getElementById('m-actions').innerHTML=`
    <button class="m-btn m-ap" onclick="setStatus('${code}','aprobada')">✅ Marcar aprobada</button>
    <button class="m-btn m-cu" onclick="setStatus('${code}','cursando')">📖 Estoy cursando</button>
    <button class="m-btn m-rst" onclick="setStatus('${code}','reset')">↩ Resetear</button>`;
  document.getElementById('overlay').classList.add('open');
}

function setStatus(code,s){
  AP.delete(code);CU.delete(code);
  if(s==='aprobada')AP.add(code); else if(s==='cursando')CU.add(code);
  save();render();closeModal();toast(`${ICON[st(code)]} ${S[code].name}`);
}
function closeModal(e){
  if(e&&e.target!==document.getElementById('overlay'))return;
  document.getElementById('overlay').classList.remove('open');
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('overlay').classList.remove('open');});

// ══ MODE ══
let isDark=false;
function toggleMode(){
  isDark=!isDark;
  document.documentElement.setAttribute('data-mode',isDark?'dark':'light');
  document.getElementById('mode-btn').textContent=isDark?'☀️':'🌙';
  localStorage.setItem('act_mode',isDark?'dark':'light');
  setTimeout(()=>{ buildGraph(); buildGrid(); if(window._edges)colorEdges(window._edges); },40);
}

// ══ STORAGE ══
function save(){localStorage.setItem('act_v5',JSON.stringify({ap:[...AP],cu:[...CU]}));}
function load(){
  try{const d=JSON.parse(localStorage.getItem('act_v5')||'{}');AP=new Set(d.ap||[]);CU=new Set(d.cu||[]);}catch(_){}
  const m=localStorage.getItem('act_mode');
  if(m==='dark'){isDark=true;document.documentElement.setAttribute('data-mode','dark');document.getElementById('mode-btn').textContent='☀️';}
}
function exportProgress(){
  const a=document.createElement('a');
  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify({ap:[...AP],cu:[...CU]},null,2));
  a.download='progreso_actuarial.json';a.click();toast('✓ Progreso exportado');
}
function importProgress(){
  const inp=Object.assign(document.createElement('input'),{type:'file',accept:'.json'});
  inp.onchange=e=>{
    const r=new FileReader();
    r.onload=ev=>{try{const d=JSON.parse(ev.target.result);AP=new Set(d.ap||[]);CU=new Set(d.cu||[]);save();render();toast('✓ Progreso cargado');}catch{toast('✗ Archivo inválido');}};
    r.readAsText(e.target.files[0]);
  };inp.click();
}
function resetConfirm(){
  if(confirm('¿Reiniciar todo el progreso?')){AP.clear();CU.clear();save();render();toast('Progreso reiniciado');}
}
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._to);t._to=setTimeout(()=>t.classList.remove('show'),2400);
}

// ══ RENDER ══
function render(){updateStats();buildGraph();buildGrid();}

load(); render();
</script>
</body>
</html>
